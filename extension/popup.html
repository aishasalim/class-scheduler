<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ZLP Schedule Importer</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #ffffff;
        --fg: #1a1a1a;
        --muted: #6b7280;
        --border: #e5e7eb;
        --accent: #500000;
        --accent-fg: #ffffff;
        --ok: #166534;
        --ok-bg: #dcfce7;
        --err: #991b1b;
        --err-bg: #fee2e2;
        --movable-bg: #f3f4f6;
        --unmovable-bg: #500000;
      }
      * { box-sizing: border-box; }
      body {
        width: 380px;
        margin: 0;
        padding: 16px;
        font: 13px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        color: var(--fg);
        background: var(--bg);
      }
      h1 { font-size: 15px; margin: 0 0 2px; }
      p.sub { margin: 0 0 12px; color: var(--muted); font-size: 12px; }
      .row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
      .row label { flex: 0 0 72px; font-size: 12px; color: var(--muted); }
      input[type="text"],
      input[type="password"] {
        flex: 1;
        width: 100%;
        padding: 8px 10px;
        font-size: 13px;
        border: 1px solid var(--border);
        border-radius: 8px;
      }
      button {
        width: 100%;
        padding: 10px 12px;
        font-size: 14px;
        font-weight: 600;
        color: var(--accent-fg);
        background: var(--accent);
        border: none;
        border-radius: 8px;
        cursor: pointer;
      }
      button.secondary {
        background: #fff;
        color: var(--fg);
        border: 1px solid var(--border);
        font-weight: 500;
        font-size: 13px;
        padding: 8px 10px;
      }
      button:disabled { opacity: 0.6; cursor: progress; }
      .link-btn {
        background: none;
        border: none;
        color: var(--accent);
        font-size: 12px;
        padding: 0;
        width: auto;
        font-weight: 500;
        cursor: pointer;
        text-decoration: underline;
      }
      #status {
        margin: 12px 0 0;
        padding: 10px 12px;
        border-radius: 8px;
        font-size: 12.5px;
        white-space: pre-wrap;
        display: none;
      }
      #status.ok { display: block; color: var(--ok); background: var(--ok-bg); }
      #status.err { display: block; color: var(--err); background: var(--err-bg); }
      #status.info { display: block; color: var(--muted); background: #f3f4f6; }
      .section-title {
        margin: 14px 0 8px;
        font-size: 11px;
        font-weight: 600;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.03em;
      }
      .course-list { display: flex; flex-direction: column; gap: 6px; max-height: 220px; overflow-y: auto; }
      .course-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 8px 10px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--movable-bg);
      }
      .course-item.unmovable { background: #fef2f2; border-color: #fecaca; }
      .course-code { font-weight: 600; font-size: 13px; }
      .prio-toggle {
        width: auto;
        padding: 4px 10px;
        font-size: 11px;
        font-weight: 600;
        border-radius: 999px;
        background: #fff;
        color: var(--muted);
        border: 1px solid var(--border);
      }
      .course-item.unmovable .prio-toggle {
        background: var(--unmovable-bg);
        color: #fff;
        border-color: var(--unmovable-bg);
      }
      .hidden { display: none !important; }
      .header-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
      .endpoint { margin-top: 10px; font-size: 11px; color: var(--muted); }
      code { background: #f3f4f6; padding: 1px 4px; border-radius: 4px; }
    </style>
  </head>
  <body>
    <!-- Setup / settings -->
    <div id="setup-view">
      <div class="header-row">
        <div>
          <h1 id="setup-title">Welcome</h1>
          <p class="sub" id="setup-sub">Enter your info once — used for every import.</p>
        </div>
        <button type="button" class="link-btn hidden" id="back-btn">← Back</button>
      </div>
      <div class="row"><label for="name-input">Full name</label><input id="name-input" type="text" placeholder="Jane Doe" /></div>
      <div class="row"><label for="cohort-input">Cohort</label><input id="cohort-input" type="text" placeholder="K" maxlength="8" /></div>
      <div class="row"><label for="password-input">Password</label><input id="password-input" type="password" placeholder="From your facilitator" /></div>
      <button id="save-setup-btn">Save & continue</button>
    </div>

    <!-- Main import view -->
    <div id="main-view" class="hidden">
      <div class="header-row">
        <div>
          <h1>Import my schedule</h1>
          <p class="sub" id="identity-line">—</p>
        </div>
        <button type="button" class="link-btn" id="settings-btn">Settings</button>
      </div>

      <button id="import-btn">Import my schedule</button>
      <div id="status"></div>

      <div id="courses-section" class="hidden">
        <p class="section-title">Class priority</p>
        <p class="sub" style="margin-top: -4px;">Toggle movable vs unmovable per class. Saves automatically.</p>
        <div id="course-list" class="course-list"></div>
      </div>

      <p class="endpoint">POST → <code id="endpoint">…</code></p>
    </div>

    <script src="config.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
